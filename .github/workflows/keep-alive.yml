name: Keep Alive

# Runs every 50 days to prevent GitHub from disabling scheduled workflows
# (GitHub disables them after 60 days of repository inactivity)
on:
  schedule:
    - cron: '0 6 1 */2 *'  # 1st of every other month at 06:00 UTC (~every 50-60 days)
  workflow_dispatch:        # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update keep-alive timestamp
        run: |
          echo "Last keep-alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/keep-alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keep-alive.txt
          git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push
